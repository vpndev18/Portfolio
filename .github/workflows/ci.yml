name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API · build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Portfolio.sln

      - name: Build
        run: dotnet build Portfolio.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Portfolio.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore

  web:
    name: Web · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Portfolio.Web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Portfolio.Web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # CI build target — overridden by Cloudflare Pages env at deploy time.
          VITE_API_URL: ''
